services:
  - type: web
    name: nutrition-recipe-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./nutrition_demo.db
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: nutrition-db
      mountPath: /opt/render/project/src
      sizeGB: 1
